name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test & smoke (Python 3.10)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and set up Python 3.10
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Install dependencies (clean-room uv.lock rehearsal)
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy src shims cli.py seed

      - name: Pytest
        run: uv run pytest

      - name: End-to-end smoke (seed -> consolidate -> aging)
        run: uv run python cli.py all

      - name: Data-quality contract gate
        run: uv run python cli.py validate

      - name: App page smoke (stubbed Streamlit; no extras needed)
        run: uv run pytest tests/test_app_smoke.py -q

      - name: API smoke (FastAPI TestClient)
        run: |
          uv sync --extra api
          uv run pytest tests/test_api.py -q

  docker:
    name: Docker image build & container smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t stocklens:ci .

      - name: Run API container and smoke-test it
        run: |
          docker run -d --name stocklens-api -p 8000:8000 stocklens:ci
          for _ in $(seq 1 30); do
            curl -fsS http://localhost:8000/healthz >/dev/null && break
            sleep 2
          done
          echo "--- /healthz ---"; curl -fsS http://localhost:8000/healthz; echo
          echo "--- /kpis ---";    curl -fsS http://localhost:8000/kpis | head -c 400; echo
          docker rm -f stocklens-api
